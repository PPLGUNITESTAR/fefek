name: Sweet

on:
  workflow_dispatch:
  schedule:
    - cron: "5 3 * * 0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.ts.outputs.TIME }}
      date: ${{ steps.ts.outputs.DATE }}
      kernel_hash: ${{ steps.extract_info.outputs.HASH }}
      kernel_msg: ${{ steps.extract_info.outputs.MSG }}
      kernel_branch: ${{ steps.extract_info.outputs.BRANCH }}
    strategy:
      matrix:
        build-type: [sweet]
        ksu-type: [zako, zako_susfs, none]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Timestamp
        id: ts
        run: |
          DATE=$(date +'%Y%m%d')
          TIME=$(date +'%s')
          echo "DATE=$DATE" >> $GITHUB_OUTPUT
          echo "TIME=$TIME" >> $GITHUB_OUTPUT

      - name: Setup Compiler Cache (ccache)
        uses: actions/cache@v5.0.4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.build-type }}-${{ matrix.ksu-type }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.build-type }}-${{ matrix.ksu-type }}-
            ${{ runner.os }}-ccache-${{ matrix.build-type }}-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential bison flex zip p7zip-full \
            libc6 curl libstdc++6 git wget libssl-dev zstd \
            lld python3 patchutils ccache

      - name: Preparing kernel sources
        run: |
          if [ -d "$PWD/android_kernel_xiaomi_sm6150" ]; then
            rm -rf android_kernel_xiaomi_sm6150
          fi
          echo "Cloning kernel sources..."
          git clone https://github.com/PPLGUNITESTAR/fefek.git -b "binder" --depth=1 android_kernel_xiaomi_sm6150
          echo "Copying buildscript..."
          cp sweet.sh android_kernel_xiaomi_sm6150/
          chmod +x ./android_kernel_xiaomi_sm6150/sweet.sh

      - name: Extract Kernel Source Info
        id: extract_info
        run: |
          cd android_kernel_xiaomi_sm6150
          echo "HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "MSG=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "BRANCH=$(git rev-parse --abbrev-ref HEAD || echo 'los-23.2-test')" >> $GITHUB_OUTPUT

      - name: Compile the kernel
        run: |
          echo "Determining KSU type..."
          echo "Starting to compile..."
          cd android_kernel_xiaomi_sm6150/
          # Presisi Absolut: Melempar tepat 2 argumen untuk menaati arsitektur sweet.sh terbaru
          ./sweet.sh sweet ${{ matrix.ksu-type }}
          cd ..

      - name: Preparing AnyKernel3 sources
        run: |
          if [ -d "$PWD/AnyKernel3" ]; then
            rm -rf AnyKernel3
          fi
          git clone https://github.com/riarumoda/AnyKernel3 AnyKernel3 --depth=1
          # Hapus riwayat git untuk memaksimalkan reduksi ukuran ZIP
          rm -rf AnyKernel3/.git

          echo "Copying compiled artifacts to AnyKernel3..."
          cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/Image.gz AnyKernel3/
          cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/dtb.img AnyKernel3/
          cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/dtbo.img AnyKernel3/

          echo "Patching AnyKernel3 banner..."
          sed -i 's/sweet (sm6150)/sweet (sm6150)/g' AnyKernel3/banner

      - name: Pack kernel with AnyKernel3
        run: |
          ZIPNAME="Houdini-${{ matrix.build-type }}-weekly-${{ matrix.ksu-type }}-${{ steps.ts.outputs.DATE }}-${{ steps.ts.outputs.TIME }}.zip"
          cd AnyKernel3
          # Menggunakan algoritma kompresi deflasi paling agresif (-9)
          zip -rq9 "../$ZIPNAME" ./*
          cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.build-type }}-${{ matrix.ksu-type }}
          path: |
            *.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: kernel-weekly-${{ needs.build.outputs.timestamp }}
          name: Weekly - ${{ needs.build.outputs.date }}
          draft: false
          prerelease: false
          body: |
            > [!NOTE]   
            > - The kernel supports Android 11 to 16.   
            > - ReSukiSU latest manager can be found in [here](https://resukisu.github.io/guide/install.html#Get-manager).    
               
            > [!IMPORTANT]
            > - "zako" build contains ReSukiSU (Recommended).   
            > - "zako_susfs" build contains ReSukiSU + SUSFS.   
            > - "none" build does not contain any KernelSU.   

            > [!CAUTION]   
            > - Always backup your boot & dtbo image first before proceeding!

            ### 📦 Upstream Kernel Tracking
            - **Branch**: `${{ needs.build.outputs.kernel_branch }}`
            - **Commit**: [`${{ needs.build.outputs.kernel_hash }}`] - *${{ needs.build.outputs.kernel_msg }}*
          files: artifacts/**/*.zip
          overwrite_files: true
