name: Sweet

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch kernel yang akan di-build"
        required: true
        default: "main"
      bore:
        description: "BORE scheduler?"
        required: true
        default: false
        type: boolean
      f2fs:
        description: "F2FS Compression?"
        required: true
        default: true
        type: boolean
      toolchain:
        description: "Toolchain selection"
        required: true
        default: "neutron"
        type: choice
        options:
          - neutron
          - lilium
          - kaleidoscope
          - greenforce

  schedule:
    - cron: "5 3 * * 0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      timestamp: ${{ steps.ts.outputs.TIME }}
      date: ${{ steps.ts.outputs.DATE }}
      changelog: ${{ steps.extract_info.outputs.CHANGELOG }}
    strategy:
      matrix:
        build-type: [sweet]
        ksu-type: [zako, zako_susfs, ksunext, ksunext_susfs, none]

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          path: android_kernel_xiaomi_sm6150
          fetch-depth: 10
          ref: ${{ github.event.inputs.branch || 'binder' }}

      - name: Timestamp
        id: ts
        run: |
          DATE=$(TZ='Asia/Jakarta' date +'%Y%m%d')
          TIME=$(TZ='Asia/Jakarta' date +'%s')
          CLOCK=$(TZ='Asia/Jakarta' date +'%H%M')
          echo "DATE=$DATE" >> $GITHUB_OUTPUT
          echo "TIME=$TIME" >> $GITHUB_OUTPUT
          echo "CLOCK=$CLOCK" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential bison flex zip p7zip-full advancecomp \
            libc6 curl libstdc++6 git wget libssl-dev zstd \
            lld python3 patchutils

      - name: Preparing kernel sources
        run: |
          echo "Setting permissions for buildscript..."
          chmod +x ./android_kernel_xiaomi_sm6150/sweet.sh

      - name: Extract Changelog
        id: extract_info
        run: |
          cd android_kernel_xiaomi_sm6150
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log -n 10 --pretty=format:"- %h: %s" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Compile the kernel
        run: |
          echo "Determining KSU type..."
          echo "Starting to compile..."
          cd android_kernel_xiaomi_sm6150/
          BORE_VAL="none"
          if [[ "${{ github.event.inputs.bore }}" == "true" || "${{ github.event_name }}" == "schedule" ]]; then
            BORE_VAL="bore"
          fi
          F2FS_VAL="none"
          if [[ "${{ github.event.inputs.f2fs }}" == "true" ]]; then
            F2FS_VAL="f2fs"
          fi
          TOOLCHAIN_VAL="${{ github.event.inputs.toolchain || 'neutron' }}"
          ./sweet.sh sweet ${{ matrix.ksu-type }} $BORE_VAL $F2FS_VAL $TOOLCHAIN_VAL
          cd ..

      - name: Preparing AnyKernel3
        run: |
          echo "AnyKernel3 artifacts were prepared by sweet.sh"
          ls -l android_kernel_xiaomi_sm6150/AnyKernel3/Image.gz
          ls -l android_kernel_xiaomi_sm6150/AnyKernel3/buildinfo.sh

      - name: Pack kernel with AnyKernel3
        run: |
          BORE_TAG=""
          if [[ "${{ github.event.inputs.bore }}" == "true" || "${{ github.event_name }}" == "schedule" ]]; then
            BORE_TAG="-BORE"
          fi
          F2FS_TAG=""
          if [[ "${{ github.event.inputs.f2fs }}" == "true" ]]; then
            F2FS_TAG="-F2FS"
          fi
          TC_TAG="-${{ github.event.inputs.toolchain || 'neutron' }}"
          ZIPNAME="Houdini-${{ matrix.build-type }}-weekly-${{ matrix.ksu-type }}${BORE_TAG}${F2FS_TAG}${TC_TAG}-${{ steps.ts.outputs.DATE }}-${{ steps.ts.outputs.CLOCK }}.zip"
          cd android_kernel_xiaomi_sm6150/AnyKernel3
          zip -rq9 "../../$ZIPNAME" ./*
          cd ../..

          echo "Optimizing ZIP compression..."
          advzip -z -4 -i 100 "$ZIPNAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.build-type }}-${{ matrix.ksu-type }}
          path: |
            *.zip

      - name: Upload Compile Warnings
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: warnings-log-${{ matrix.build-type }}-${{ matrix.ksu-type }}
          path: android_kernel_xiaomi_sm6150/warnings.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: kernel-weekly-${{ needs.build.outputs.timestamp }}
          name: Weekly - ${{ needs.build.outputs.date }}
          draft: false
          prerelease: false
          body: |
            ## Houdini Kernel for Sweet

            > [!CAUTION]
            > **Always back up your `boot` and `dtbo` partitions** before flashing!

            ### Build variants
            | Variant | Root Solution | Optional Toggles | Extra Features |
            | :--- | :--- | :--- | :--- |
            | **`zako`** | ReSukiSU | `-BORE` & `-F2FS` | Standard Hook |
            | **`zako_susfs`** | ReSukiSU | `-BORE` & `-F2FS` | SUSFS (Enhanced Hide) |
            | **`ksunext`** | KernelSU-Next | `-BORE` & `-F2FS` | Standard Hook |
            | **`ksunext_susfs`** | KernelSU-Next | `-BORE` & `-F2FS` | SUSFS (Enhanced Hide) |
            | **`none`** | *(Unrooted)* | `-BORE` & `-F2FS` | Pure Vanilla |

            > [!NOTE]
            > - **Compatibility:** Android 11 - Android 16.
            > - **ReSukiSU Manager:** [Download here](https://resukisu.github.io/guide/install.html#Get-manager)
            > - **KernelSU-Next Manager:** [Download here](https://github.com/KernelSU-Next/KernelSU-Next/releases)

            ---

            ### 📝 Recent Commits
            ${{ needs.build.outputs.changelog }}
          files: artifacts/**/*.zip
          overwrite_files: true
