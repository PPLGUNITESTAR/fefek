name: Sweet

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch kernel yang akan di-build"
        required: true
        default: "main"
      bore:
        description: "BORE scheduler?"
        required: true
        default: false
        type: boolean
      f2fs:
        description: "F2FS Compression?"
        required: true
        default: true
        type: boolean
      toolchain:
        description: "Toolchain selection"
        required: true
        default: "neutron"
        type: choice
        options:
          - neutron
          - lilium
          - kaleidoscope
          - greenforce

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      timestamp: ${{ steps.ts.outputs.TIME }}
      date: ${{ steps.ts.outputs.DATE }}
      changelog: ${{ steps.extract_info.outputs.CHANGELOG }}
    strategy:
      fail-fast: false
      matrix:
        build-type: [sweet]
        ksu-type: [zako, zako_susfs, ksunext, ksunext_susfs, none]

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          path: android_kernel_xiaomi_sm6150
          fetch-depth: 10
          ref: ${{ github.event.inputs.branch || 'binder' }}

      - name: Timestamp
        id: ts
        run: |
          DATE=$(TZ='Asia/Jakarta' date +'%Y%m%d')
          TIME=$(TZ='Asia/Jakarta' date +'%s')
          CLOCK=$(TZ='Asia/Jakarta' date +'%H%M')
          echo "DATE=$DATE" >> $GITHUB_OUTPUT
          echo "TIME=$TIME" >> $GITHUB_OUTPUT
          echo "CLOCK=$CLOCK" >> $GITHUB_OUTPUT

      - name: Setup swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison flex build-essential zip p7zip-full \
            libc6 libstdc++6 libssl-dev libelf-dev zstd \
            lld patchutils ccache python3 curl wget

      - name: Preparing kernel sources
        run: |
          echo "Setting permissions for buildscript..."
          chmod +x ./android_kernel_xiaomi_sm6150/sweet.sh

      - name: Extract Changelog
        id: extract_info
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE/android_kernel_xiaomi_sm6150"
          cd android_kernel_xiaomi_sm6150
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log -n 10 --pretty=format:"- %h: %s" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Compile the kernel
        run: |
          echo "Determining KSU type..."
          echo "Starting to compile..."
          cd android_kernel_xiaomi_sm6150/
          BORE_VAL="none"
          if [[ "${{ github.event.inputs.bore }}" == "true" ]]; then
            BORE_VAL="bore"
          fi
          F2FS_VAL="none"
          if [[ "${{ github.event.inputs.f2fs }}" == "true" ]]; then
            F2FS_VAL="f2fs"
          fi
          TOOLCHAIN_VAL="${{ github.event.inputs.toolchain || 'neutron' }}"
          ./sweet.sh sweet ${{ matrix.ksu-type }} $BORE_VAL $F2FS_VAL $TOOLCHAIN_VAL
          cd ..

      - name: Preparing AnyKernel3
        run: |
          echo "AnyKernel3 artifacts were prepared by sweet.sh"
          ls -l android_kernel_xiaomi_sm6150/AnyKernel3/Image.gz
          ls -l android_kernel_xiaomi_sm6150/AnyKernel3/buildinfo.sh

      - name: Pack kernel with AnyKernel3
        run: |
          BORE_TAG=""
          if [[ "${{ github.event.inputs.bore }}" == "true" ]]; then
            BORE_TAG="-BORE"
          fi
          F2FS_TAG=""
          if [[ "${{ github.event.inputs.f2fs }}" == "true" ]]; then
            F2FS_TAG="-F2FS"
          fi
          TC_TAG="-${{ github.event.inputs.toolchain || 'neutron' }}"
          ZIPNAME="Houdini-${{ matrix.build-type }}-weekly-${{ matrix.ksu-type }}${BORE_TAG}${F2FS_TAG}${TC_TAG}-${{ steps.ts.outputs.DATE }}-${{ steps.ts.outputs.CLOCK }}.zip"
          cd android_kernel_xiaomi_sm6150/AnyKernel3
          zip -rq9 "../../$ZIPNAME" ./*
          cd ../..

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.build-type }}-${{ matrix.ksu-type }}
          path: |
            *.zip

      - name: Upload Compile Warnings
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: warnings-log-${{ matrix.build-type }}-${{ matrix.ksu-type }}
          path: android_kernel_xiaomi_sm6150/warnings.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: kernel-build-${{ needs.build.outputs.timestamp }}
          name: Houdini Kernel Build - ${{ needs.build.outputs.date }}
          draft: false
          prerelease: false
          body: |
            # Houdini Kernel for Sweet
            *Yet another sloppy custom kernel for Redmi Note 10 Pro.*

            ---

            > [!CAUTION]
            > **FLASH AT YOUR OWN RISK!**
            > Always remember to back up your `boot` and `dtbo` partitions before proceeding. We are not responsible for any damage or data loss.

            ### Build Variants Overview

            Choose the variant that best matches your setup. All builds support optional `-BORE` and `-F2FS` enhancements.

            | Variant | Root Solution | Features & Hooks | Recommended For |
            | :--- | :--- | :--- | :--- |
            | **`zako`** | [ReSukiSU](https://resukisu.github.io/guide/install.html) | Standard Hooks | General users needing root access |
            | **`zako_susfs`** | [ReSukiSU](https://resukisu.github.io/guide/install.html) | SUSFS (Enhanced Hide) | Users who need strict root hiding (Banking/Games) |
            | **`ksunext`** | [KernelSU-Next](https://github.com/KernelSU-Next/KernelSU-Next) | Standard Hooks (legacy) | Users preferring KernelSU-Next |
            | **`ksunext_susfs`** | [KernelSU-Next](https://github.com/KernelSU-Next/KernelSU-Next) | SUSFS + legacy hooks | KSU-Next users needing root hiding |
            | **`none`** | *(Unrooted)* | Pure Vanilla | Users looking for maximum stability without root |

            ### Important Notes

            > [!NOTE]
            > - **Compatibility:** Seamlessly supports **Android 11** up to **Android 16**.
            > - **Manager App:** If flashing a `zako` variant, grab the latest **ReSukiSU Manager** from [the official site](https://resukisu.github.io/guide/install.html#Get-manager).
            > - **Installation:** Flash the provided `.zip` files via a custom recovery (TWRP/OrangeFox) or a kernel flasher app (FKM/Kernel Flasher).

            ---

            <details>
            <summary><b>Click to expand Changelog & Recent Commits</b></summary>

            ${{ needs.build.outputs.changelog }}

            </details>
          files: artifacts/**/*.zip
          overwrite_files: true
